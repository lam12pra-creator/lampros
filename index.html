<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Λάμπρος Site</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e1e2f, #2a2a40);
    font-family: Arial;
    color: white;
}

.container {
    display: flex;
    gap: 60px;
}

.box {
    width: 260px;
    height: 320px;
    background-color: #222;
    border-radius: 20px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
    padding: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
}

.box:hover {
    transform: scale(1.08);
    background-color: #00ffcc;
    color: black;
}

.box img {
    width: 100%;
    height: auto;
    max-height: 200px;
    object-fit: contain;
    border-radius: 12px;
}

h2 {
    margin-top: 15px;
}
</style>
</head>
<body>

<div class="container">

    <!-- ⚽ ΜΠΑΛΑ -->
    <div class="box" onclick="openBallSite()">
        <img src="ball.jpg" alt="Μπάλα">
        <h2>⚽ Μπάλα</h2>
    </div>

    <!-- 🎬 ΤΑΙΝΙΕΣ -->
    <div class="box" onclick="openMovies()">
        <img src="movie.jpg" alt="Ταινίες">
        <h2>🎬 Ταινίες</h2>
    </div>

</div>

<script>
// Όταν φορτώνει η σελίδα, ανοίγει αυτόματα Google
window.onload = function() {
    window.open("https://www.google.com", "_blank");
}

// Άνοιγμα site μπάλα
function openBallSite() {
    window.open("https://www.google.com", "_blank");
}

// Άνοιγμα site ταινίες
function openMovies() {
    window.open("https://www.netflix.com", "_blank");
}
</script>

</body>
</html>
